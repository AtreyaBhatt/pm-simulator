name: pm-simulator
version: "1.0.0"
description: >
  Product Manager decision-making environment. Simulates real-world PM tasks:
  bug triage, sprint planning under capacity constraints, and multi-sprint
  stakeholder management with compounding metric effects. Designed to train and
  evaluate AI agents on prioritisation, trade-off reasoning, and strategic planning.

author: "PM Simulator Team"
license: "MIT"

tags:
  - product-management
  - prioritisation
  - decision-making
  - business
  - planning
  - multi-turn

tasks:
  - id: task_1
    name: "Bug Triage"
    difficulty: easy
    max_turns: 1
    description: >
      Rank 8 incoming production bugs from most to least urgent.
      Graded by Kendall's τ correlation (70%) and top-3 accuracy (30%)
      against the optimal severity × impact ranking.
    expected_score_range: [0.50, 1.0]

  - id: task_2
    name: "Sprint Planning"
    difficulty: medium
    max_turns: 1
    description: >
      Select backlog items for a 40-story-point sprint from 15 candidates
      to maximise business value. Graded by value ratio vs. optimal knapsack (65%),
      capacity utilisation (20%), and item-type diversity (15%).
      Over-capacity selections score 0.
    expected_score_range: [0.40, 0.90]

  - id: task_3
    name: "Stakeholder Gauntlet"
    difficulty: hard
    max_turns: 3
    description: >
      Manage 3 consecutive sprints under competing stakeholder demands (CEO, users,
      engineering). Product metrics (user satisfaction, revenue health, tech-debt score,
      team velocity) decay each sprint any stakeholder group is neglected.
      Graded by average metric health (35%), value delivered (35%),
      and resilience — no metric below 50 at episode end (30%).
    expected_score_range: [0.25, 0.75]

observation_space:
  type: object
  description: >
    JSON object containing task context, full backlog with item metadata,
    sprint capacity, current product metrics, stakeholder messages, turn info,
    and valid action types.
  fields:
    task_id: string
    task_name: string
    task_description: string
    context: string
    backlog:
      type: array
      items:
        id: string
        title: string
        description: string
        type: enum [bug, feature, tech_debt]
        severity: integer [1-5]
        effort: integer [1-13]
        business_value: integer [1-10]
        user_impact: integer [1-10]
        stakeholder: string
        tags: array[string]
    sprint_capacity: integer
    sprint_capacity_used: integer
    sprint_items_selected: array[string]
    product_metrics:
      user_satisfaction: float [0-100]
      revenue_health: float [0-100]
      tech_debt_score: float [0-100]
      team_velocity: float [0-100]
    stakeholder_messages: array[object]
    current_sprint: integer
    total_sprints: integer
    turn: integer
    max_turns: integer
    valid_actions: array[string]

action_space:
  type: object
  description: >
    JSON object with an action_type and the corresponding payload.
  variants:
    rank_items:
      action_type: "rank_items"
      ranked_ids: "array[string] — all bug IDs ordered most-urgent-first"
      reasoning: "string (optional)"
    plan_sprint:
      action_type: "plan_sprint"
      selected_ids: "array[string] — item IDs to include in sprint"
      reasoning: "string (optional)"
    finalize_sprint:
      action_type: "finalize_sprint"
      selected_ids: "array[string] — item IDs to deliver this sprint"
      reasoning: "string (optional)"

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Scalar reward between 0.0 and 1.0.
    For tasks 1 and 2: single reward at episode end.
    For task 3: intermediate health reward after each sprint, final composite score at end.

environment:
  stateful: true
  deterministic: true
  multi_turn: true
  max_turns_per_task: 3
  real_world_domain: "B2B SaaS product management"

endpoints:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  tasks: "GET /tasks"
  health: "GET /health"
