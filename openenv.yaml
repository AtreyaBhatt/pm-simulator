name: pm-simulator
version: "1.0.0"
description: >
  A Product Manager simulation environment where an AI agent triages bugs,
  plans sprints, and builds quarterly roadmaps for a fictional B2B SaaS company.
  Models real-world PM decision-making under capacity constraints, stakeholder
  conflicts, and dependency ordering.

author: "PM Simulator"
license: MIT

tags:
  - product-management
  - planning
  - decision-making
  - business
  - real-world

tasks:
  - id: task1_bug_triage
    name: "Bug Triage Sprint"
    difficulty: easy
    max_steps: 20
    description: >
      Assign P0-P3 priorities to 10 incoming bug reports. Graded on accuracy
      vs deterministic ground truth derived from severity x impact formula.
    expected_score_range: [0.50, 1.0]

  - id: task2_sprint_planning
    name: "Sprint 14 Planning"
    difficulty: medium
    max_steps: 35
    description: >
      Select items from a 13-item backlog to fill a 34-point sprint. Must include
      all P0 bugs, stay within capacity, and maximise total value delivered.
    expected_score_range: [0.40, 0.90]

  - id: task3_quarterly_roadmap
    name: "Q3 Roadmap - Stakeholder Alignment"
    difficulty: hard
    max_steps: 60
    description: >
      Build a 3-sprint quarterly roadmap from 18 items with conflicting stakeholder
      priorities, dependency constraints, and multi-OKR coverage requirements.
    expected_score_range: [0.25, 0.75]

endpoints:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  tasks: "GET /tasks"
  health: "GET /health"

action_space:
  type: object
  description: >
    JSON object with action_type and optional fields depending on type.
  fields:
    action_type:
      type: string
      enum: [prioritize, schedule, defer, request_info, submit]
    item_id:
      type: string
      description: "Target product item ID (e.g. BUG-001, FEAT-103)"
      required_for: [prioritize, schedule, defer, request_info]
    priority:
      type: string
      enum: [P0, P1, P2, P3]
      required_for: [prioritize]
    sprint:
      type: integer
      enum: [1, 2, 3]
      required_for: [schedule]
    reason:
      type: string
      description: "Rationale for deferral or prioritization"
    thought:
      type: string
      description: "Agent chain-of-thought reasoning (not graded)"

observation_space:
  type: object
  fields:
    task_id: string
    task_name: string
    task_description: string
    items: array[ProductItem]
    sprint_capacity: integer
    current_sprint_load: integer
    metrics: TeamMetrics
    step_number: integer
    max_steps: integer
    context: object
    message: string
    available_actions: array[string]

reward:
  type: float
  range: [-1.0, 1.0]
  description: >
    Dense per-step rewards. Correct triage: +0.15, wrong: -0.15 to -0.35.
    Valid schedule: +0.04-0.09, capacity violation: -0.15, P0 defer: -0.20.
    Submit triggers final grader, adds bonus up to +0.5.

environment:
  stateful: true
  deterministic: true
  multi_turn: true
  real_world_domain: "B2B SaaS product management"
